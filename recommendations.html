<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Personalized Business Ideas | BizBot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
        background: linear-gradient(180deg, #f7fafc 0%, #ffffff 100%);
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 48px;
      }

      .logo {
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        cursor: pointer;
      }

      .header h1 {
        font-size: 36px;
        color: #1a202c;
        margin-bottom: 12px;
      }

      .header p {
        font-size: 18px;
        color: #4a5568;
      }

      .loading-container {
        text-align: center;
        padding: 80px 20px;
      }

      .loading-spinner {
        display: inline-block;
        width: 60px;
        height: 60px;
        border: 6px solid #e2e8f0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 20px;
        color: #4a5568;
        margin-bottom: 12px;
      }

      .loading-subtext {
        font-size: 16px;
        color: #718096;
      }

      .results-container {
        display: none;
      }

      .results-container.active {
        display: block;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .profile-summary {
        background: white;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 40px;
      }

      .profile-summary h2 {
        font-size: 24px;
        color: #1a202c;
        margin-bottom: 16px;
      }

      .profile-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .tag {
        padding: 8px 16px;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        color: #667eea;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
      }

      .ideas-grid {
        display: grid;
        gap: 32px;
      }

      .idea-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        border: 2px solid transparent;
        transition: all 0.3s;
      }

      .idea-card:hover {
        border-color: #667eea;
        box-shadow: 0 12px 24px rgba(102, 126, 234, 0.15);
        transform: translateY(-4px);
      }

      .idea-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 20px;
      }

      .idea-number {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
      }

      .fit-score {
        background: #e6fffa;
        color: #065f46;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
      }

      .fit-score.high {
        background: #d1fae5;
        color: #065f46;
      }

      .fit-score.medium {
        background: #fef3c7;
        color: #92400e;
      }

      .idea-card h3 {
        font-size: 28px;
        color: #1a202c;
        margin-bottom: 12px;
      }

      .idea-description {
        font-size: 16px;
        color: #4a5568;
        line-height: 1.7;
        margin-bottom: 24px;
      }

      .idea-section {
        margin-bottom: 24px;
      }

      .idea-section h4 {
        font-size: 18px;
        color: #2d3748;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .idea-section ul {
        list-style: none;
        padding-left: 0;
      }

      .idea-section li {
        padding: 8px 0;
        padding-left: 24px;
        position: relative;
        color: #4a5568;
        line-height: 1.6;
      }

      .idea-section li::before {
        content: '→';
        position: absolute;
        left: 0;
        color: #667eea;
        font-weight: bold;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 2px solid #e2e8f0;
      }

      .metric {
        text-align: center;
      }

      .metric-label {
        font-size: 12px;
        color: #718096;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .metric-value {
        font-size: 20px;
        font-weight: 700;
        color: #667eea;
      }

      .action-button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 24px;
      }

      .action-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
      }

      .cta-section {
        text-align: center;
        padding: 60px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 16px;
        margin-top: 48px;
        color: white;
      }

      .cta-section h2 {
        font-size: 32px;
        margin-bottom: 16px;
      }

      .cta-section p {
        font-size: 18px;
        margin-bottom: 32px;
        opacity: 0.95;
      }

      .cta-button {
        padding: 16px 48px;
        background: white;
        color: #667eea;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      @media (max-width: 768px) {
        .idea-card {
          padding: 24px;
        }

        .metrics-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">BizBot</div>
        <h1>Your Personalized Business Ideas</h1>
        <p>Based on your unique profile and goals</p>
      </div>

      <!-- Loading State -->
      <div class="loading-container" id="loadingContainer">
        <div class="loading-spinner"></div>
        <div class="loading-text">Analyzing your profile...</div>
        <div class="loading-subtext">Finding the perfect business ideas for you</div>
      </div>

      <!-- Results Container -->
      <div class="results-container" id="resultsContainer">
        <!-- Profile Summary -->
        <div class="profile-summary" id="profileSummary">
          <h2>Your Profile</h2>
          <div class="profile-tags" id="profileTags"></div>
        </div>

        <!-- Business Ideas will be inserted here -->
        <div class="ideas-grid" id="ideasGrid"></div>

        <!-- CTA Section -->
        <div class="cta-section">
          <h2>Ready to Take the Next Step?</h2>
          <p>Dive deeper into your chosen idea with our detailed evaluation tool</p>
          <button class="cta-button" onclick="window.location.href='index.html'">Evaluate Your Idea</button>
        </div>
      </div>
    </div>

    <script>
      // Get user data from sessionStorage
      const userData = JSON.parse(sessionStorage.getItem('userQuestionnaireData') || '{}');

      // Display profile summary
      function displayProfileSummary() {
        const tags = [];
        
        if (userData.professional_status) {
          const statusLabels = {
            'employed_fulltime': 'Full-time Employed',
            'employed_parttime': 'Part-time Employed',
            'freelancer': 'Freelancer',
            'student': 'Student',
            'unemployed': 'Job Seeker',
            'retired': 'Retired'
          };
          tags.push(statusLabels[userData.professional_status]);
        }

        if (userData.budget) {
          const budgetLabels = {
            'under_1000': 'Budget: <$1K',
            '1000_5000': 'Budget: $1K-$5K',
            '5000_25000': 'Budget: $5K-$25K',
            '25000_50000': 'Budget: $25K-$50K',
            'over_50000': 'Budget: $50K+'
          };
          tags.push(budgetLabels[userData.budget]);
        }

        if (userData.timeCommitment) {
          tags.push(`${userData.timeCommitment} hrs/week`);
        }

        if (userData.location) {
          const locationLabels = {
            'online_only': 'Remote/Online',
            'local': 'Local Business',
            'hybrid': 'Hybrid'
          };
          tags.push(locationLabels[userData.location]);
        }

        const tagsContainer = document.getElementById('profileTags');
        tags.forEach(tag => {
          const tagEl = document.createElement('div');
          tagEl.className = 'tag';
          tagEl.textContent = tag;
          tagsContainer.appendChild(tagEl);
        });
      }

      // Generate AI-powered recommendations
      async function generateRecommendations() {
        const prompt = `Based on this user profile, generate 3 personalized business idea recommendations:

Professional Status: ${userData.professional_status || 'Not specified'}
Time Availability: ${userData.timeCommitment || 'Not specified'} hours per week
Starting Capital: ${userData.budget || 'Not specified'}
Skills: ${Array.isArray(userData.skills) ? userData.skills.join(', ') : 'Not specified'}
Business Model Preference: ${userData.business_model || 'Not specified'}
Target Market: ${userData.target_market || 'Not specified'}
Location Preference: ${userData.location || 'Not specified'}
Risk Tolerance: ${userData.riskTolerance || 'Not specified'}/10
Revenue Timeline: ${userData.revenue_timeline || 'Not specified'}
Industry Interests: ${Array.isArray(userData.industries) ? userData.industries.join(', ') : 'Not specified'}
Primary Goal: ${userData.primary_goal || 'Not specified'}
Additional Context: ${userData.additionalContext || 'None'}

For each business idea, provide:
1. A catchy business name/concept
2. Detailed description (2-3 sentences)
3. Why it's a good fit for this user (3-4 specific reasons)
4. First steps to get started (4-5 actionable items)
5. Estimated startup cost range
6. Estimated time to first revenue
7. Scalability potential (Low/Medium/High)
8. Competition level (Low/Medium/High)
9. Match score (percentage based on user profile)

Return the response as a JSON array with exactly 3 business ideas. Each idea should have these fields:
{
  "name": "Business Idea Name",
  "description": "Detailed description",
  "fitReasons": ["reason 1", "reason 2", "reason 3", "reason 4"],
  "firstSteps": ["step 1", "step 2", "step 3", "step 4", "step 5"],
  "startupCost": "cost range",
  "timeToRevenue": "time estimate",
  "scalability": "Low/Medium/High",
  "competition": "Low/Medium/High",
  "matchScore": 95
}

IMPORTANT: Return ONLY the JSON array, no additional text or markdown formatting.`;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 4000,
              messages: [
                { role: "user", content: prompt }
              ],
            })
          });

          const data = await response.json();
          
          // Extract the JSON from the response
          let ideasText = data.content[0].text;
          
          // Remove markdown code blocks if present
          ideasText = ideasText.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          
          const ideas = JSON.parse(ideasText);
          
          return ideas;
        } catch (error) {
          console.error('Error generating recommendations:', error);
          // Fallback to sample ideas if API fails
          return getFallbackIdeas();
        }
      }

      // Fallback ideas if API fails
      function getFallbackIdeas() {
        return [
          {
            name: "AI-Powered Resume Builder SaaS",
            description: "A subscription-based platform that uses AI to help professionals create optimized resumes tailored to specific job descriptions. The tool analyzes job postings and suggests improvements to increase interview chances.",
            fitReasons: [
              "Leverages your technology skills for product development",
              "Low initial investment with SaaS model",
              "Can be built remotely with your available time",
              "Growing demand in competitive job market"
            ],
            firstSteps: [
              "Research existing resume tools and identify gaps",
              "Build a simple MVP with basic AI integration",
              "Create landing page and collect early user feedback",
              "Develop pricing tiers and subscription model",
              "Launch beta version to first 50 users"
            ],
            startupCost: "$2,000 - $5,000",
            timeToRevenue: "3-4 months",
            scalability: "High",
            competition: "Medium",
            matchScore: 92
          },
          {
            name: "Virtual Wellness Coaching",
            description: "Offer personalized health and wellness coaching services online, combining nutrition guidance, fitness planning, and mental health support. Focus on busy professionals seeking work-life balance.",
            fitReasons: [
              "Can start with minimal upfront investment",
              "Flexible schedule that fits your time availability",
              "Service-based model generates quick revenue",
              "Growing wellness industry with high demand"
            ],
            firstSteps: [
              "Get relevant certifications if not already certified",
              "Define your niche and target audience",
              "Create social media presence and content strategy",
              "Develop coaching packages and pricing",
              "Acquire first 3-5 clients through network"
            ],
            startupCost: "$500 - $2,000",
            timeToRevenue: "1-2 months",
            scalability: "Medium",
            competition: "High",
            matchScore: 88
          },
          {
            name: "Niche E-commerce Subscription Box",
            description: "Curated monthly subscription boxes for a specific niche market (e.g., eco-friendly office supplies, artisan coffee, craft supplies for hobbyists). Build a community around the subscription.",
            fitReasons: [
              "Recurring revenue model provides stable income",
              "Can be operated remotely with dropshipping",
              "Matches your interest in e-commerce",
              "Scalable with automation and outsourcing"
            ],
            firstSteps: [
              "Identify underserved niche with passionate audience",
              "Source 5-7 quality products for first box",
              "Create brand identity and packaging design",
              "Set up Shopify store with subscription plugin",
              "Launch pre-sale campaign to validate demand"
            ],
            startupCost: "$3,000 - $8,000",
            timeToRevenue: "2-3 months",
            scalability: "High",
            competition: "Medium",
            matchScore: 85
          }
        ];
      }

      // Display business ideas
      function displayIdeas(ideas) {
        const ideasGrid = document.getElementById('ideasGrid');
        
        ideas.forEach((idea, index) => {
          const ideaCard = document.createElement('div');
          ideaCard.className = 'idea-card';
          
          const fitClass = idea.matchScore >= 90 ? 'high' : idea.matchScore >= 80 ? 'medium' : '';
          
          ideaCard.innerHTML = `
            <div class="idea-header">
              <div class="idea-number">${index + 1}</div>
              <div class="fit-score ${fitClass}">${idea.matchScore}% Match</div>
            </div>
            
            <h3>${idea.name}</h3>
            <p class="idea-description">${idea.description}</p>
            
            <div class="idea-section">
              <h4>🎯 Why This Is Perfect For You</h4>
              <ul>
                ${idea.fitReasons.map(reason => `<li>${reason}</li>`).join('')}
              </ul>
            </div>
            
            <div class="idea-section">
              <h4>🚀 First Steps to Get Started</h4>
              <ul>
                ${idea.firstSteps.map(step => `<li>${step}</li>`).join('')}
              </ul>
            </div>
            
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">Startup Cost</div>
                <div class="metric-value">${idea.startupCost}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Time to Revenue</div>
                <div class="metric-value">${idea.timeToRevenue}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Scalability</div>
                <div class="metric-value">${idea.scalability}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Competition</div>
                <div class="metric-value">${idea.competition}</div>
              </div>
            </div>
            
            <button class="action-button" onclick="selectIdea(${index})">Deep Dive Into This Idea</button>
          `;
          
          ideasGrid.appendChild(ideaCard);
        });
      }

      // Select an idea for detailed evaluation
      function selectIdea(index) {
        alert('This feature will take you to a detailed evaluation of your selected business idea. Coming soon!');
        // In production, this would navigate to a detailed evaluation page
        // window.location.href = `evaluate.html?idea=${index}`;
      }

      // Initialize page
      async function init() {
        // Show loading state
        document.getElementById('loadingContainer').style.display = 'block';
        document.getElementById('resultsContainer').classList.remove('active');
        
        // Display profile summary
        displayProfileSummary();
        
        // Generate recommendations (simulated delay)
        setTimeout(async () => {
          const ideas = await generateRecommendations();
          
          // Hide loading, show results
          document.getElementById('loadingContainer').style.display = 'none';
          document.getElementById('resultsContainer').classList.add('active');
          
          // Display ideas
          displayIdeas(ideas);
        }, 2500);
      }

      // Run on page load
      init();
    </script>
  </body>
</html>
